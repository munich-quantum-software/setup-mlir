name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update_release_draft:
    name: Run
    permissions:
      contents: write
    runs-on: ubuntu-slim
    steps:
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        id: release-drafter
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Upload installation scripts
        run: gh release upload ${{ steps.release-drafter.outputs.tag_name }} installation/setup-mlir.sh installation/setup-mlir.ps1 --clobber
        env:
          GITHUB_TOKEN: ${{ github.token }}
